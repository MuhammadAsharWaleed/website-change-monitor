# Copy this file to config.yaml and fill in your own details.
# config.yaml is git-ignored on purpose - don't commit real credentials.

notifications:
  email:
    enabled: true
    smtp_server: smtp.gmail.com
    smtp_port: 587
    sender: your.email@gmail.com
    # If you're using Gmail, this needs to be an "app password", not your
    # normal login password: https://myaccount.google.com/apppasswords
    password: your-app-password
    recipients:
      - you@example.com
      - client@example.com
